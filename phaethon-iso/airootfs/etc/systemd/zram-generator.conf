# ==============================================================================
# PHAETHON OS - ZRAM COMPRESSION PAGE SWAP GENERATOR
# ==============================================================================
# Shipped at: /etc/systemd/zram-generator.conf
# Configures the systemd-zram-generator to create an dynamic swap partition
# within physical memory using high-speed zstd compression, preventing disk
# thrashing and extending SSD lifespan under heavy loads.
#

[zram0]
# Allocate exactly 50% of the total physical memory capacity to the Zram pool
zram-size = ram / 2

# Employ the industry-standard Zstandard (zstd) real-time compression algorithm
compression-algorithm = zstd

# Assign high priority so the system utilizes Zram swap before checking disk-based swaps
swap-priority = 100
