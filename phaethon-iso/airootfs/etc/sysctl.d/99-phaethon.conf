# ==============================================================================
# PHAETHON OS - CORE KERNEL PERFORMANCE PROFILES (sysctl)
# ==============================================================================
# Shipped at: /etc/sysctl.d/99-phaethon.conf
# Aggressive system parameters optimized for ultra-low process latency, maximum
# network throughput, and optimal virtualization allocations for modern games.
#

# --- 1. VIRTUAL MEMORY & SWAP CONFIGURATIONS ---
# Reserve physical RAM; do not swap out aggressively unless resources are critical.
vm.swappiness = 10
# Raise filesystem dirty page limits to prevent constant background disk write blocking.
vm.dirty_background_ratio = 5
vm.dirty_ratio = 10
# Minimize cache pressure for high-performance memory retention
vm.vfs_cache_pressure = 50

# --- 2. HIGH-PERFORMANCE GAMING & COMPILATION ---
# Essential for large memory map systems, e.g., Steam Proton, Wine, and heavy JVM IDEs.
# Prevents out-of-memory crashes in games like Hogwarts Legacy, Star Citizen, etc.
vm.max_map_count = 1048576

# Set maximum system-wide file descriptor limit for massive multi-threaded compilations.
fs.file-max = 2097152

# Disable CPU splitting locks mitigation. Disabling this restores substantial FPS loss
# on Intel and AMD processors caused by specific gaming engine operations.
kernel.split_lock_mitigate = 0

# --- 3. NETWORK THROUGHPUT & LATENCY OPTIMIZATIONS ---
# Enable TCP Fast Open (type 3 allows both client and server handshake data payload).
net.ipv4.tcp_fastopen = 3
# Enable BBR TCP congestion control algorithm (requires linux-cachyos kernel BBR module).
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr
# Increase network buffer socket thresholds for high-speed downloads.
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216
