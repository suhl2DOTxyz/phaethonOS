#
# /etc/pacman.conf (Phaethon OS Live/Installed System)
#
# Includes Arch core/extra/multilib repos via world mirrorlist
# and CachyOS repos for performance-optimized kernels and packages.
#

[options]
HoldPkg     = pacman systemd
CleanMethod = KeepInstalled
Architecture = auto

UseSyslog
Color
ILoveCandy
CheckSpace
VerbosePkgLists
ParallelDownloads = 8

SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

# ==============================================================================
# CACHYOS REPOSITORIES
# ==============================================================================
[cachyos]
SigLevel = Optional TrustAll
Include = /etc/pacman.d/cachyos-mirrorlist

# ==============================================================================
# STANDARD ARCH LINUX REPOSITORIES
# ==============================================================================
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist
