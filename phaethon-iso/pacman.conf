#
# /etc/pacman.conf (Phaethon OS ISO Build Configuration)
#
# Custom pacman.conf designed for bootstrapping and running the Phaethon OS
# rolling-release environment. It enables bleeding-edge repositories,
# high-performance kernels, multilib gaming dependencies, and our distro-specific repo.
#

[options]
# Keep pacman and systemd safe during upgrades
HoldPkg     = pacman systemd
CleanMethod = KeepInstalled
Architecture = auto

# Miscellaneous visual and download performance options
UseSyslog
Color
ILoveCandy
CheckSpace
VerbosePkgLists
ParallelDownloads = 8

# Signature verification security parameters
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

# ==============================================================================
# PHAETHON OS DISTRO CUSTOM REPOSITORY
# ==============================================================================
# Contains custom themes, artworks, scripts, and the custom Welcome app.
# Disabled until packages are built with phaethon-repo/build-repo.sh
#[phaethon]
#SigLevel = Optional TrustAll
#Server = file:///home/suhl2/Documents/PhaethonOS/phaethon-repo/x86_64

# ==============================================================================
# CACHYOS REPOSITORIES (HIGH-PERFORMANCE PACKAGES & KERNELS)
# ==============================================================================
# Leverages performance-oriented CPU optimizations and custom kernel schedules (BORE+EEVDF).
[cachyos]
SigLevel = Optional TrustAll
Server = https://mirror.cachyos.org/repo/$arch/$repo

# ==============================================================================
# STANDARD PHAETHONOS REPOSITORIES
# ==============================================================================
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

# ==============================================================================
# MULTILIB REPOSITORY (REQUIRED FOR WINE / STEAM GAMING)
# ==============================================================================
[multilib]
Include = /etc/pacman.d/mirrorlist
