name: Build Phaethon OS ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Initialize pacman keyring
        run: |
          pacman-key --init
          pacman-key --populate archlinux

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso dosfstools grub mtools xorriso squashfs-tools

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run ISO build
        run: ./build-iso.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: phaethon-os-iso
          path: build_out/*.iso
