name: Build Phaethon OS ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build ISO inside privileged Arch container
        run: |
          docker run --privileged --rm -v $PWD:/build \
            archlinux:latest \
            bash -c "
              pacman-key --init
              pacman-key --populate archlinux
              pacman -Syu --noconfirm
              pacman -S --noconfirm archiso dosfstools grub mtools xorriso squashfs-tools
              cd /build
              ./build-iso.sh
            "

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: phaethon-os-iso
          path: build_out/*.iso
